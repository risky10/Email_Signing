<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Sign Document</title>
</head>
<div id="loadingSpinner" style="
    display:none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(3px);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: #4a6cf7;
    font-weight: bold;
">
    Signing document...
</div>

<body>

<header>
    Sign Your Document
</header>

<h2>Draw your signature</h2>

<div class="sig-container">
    <canvas id="sig" width="500" height="200"></canvas>

    <button class="clear-btn" onclick="clearCanvas()">Clear</button>
    <button class="sign-btn" onclick="submitSignature()">Sign</button>
</div>


<form id="sigForm" method="POST" action="/submit_signature">
    <input type="hidden" name="doc_id" value="{{ doc_id }}">
    <input type="hidden" name="signature" id="signatureInput">
</form>

<div class="pdf-preview">
    <h3>Document Preview</h3>
    <embed src="/preview/{{ pdf_filename }}" 
        type="application/pdf" 
        width="100%" 
        height="600px">
</div>


<script src="/static/sign.js"></script>
</body>
</html>
